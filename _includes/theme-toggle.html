<button
  class="theme-toggle{% if include.variant %} theme-toggle--{{ include.variant }}{% endif %}"
  type="button"
  data-theme-toggle
  aria-pressed="false"
  aria-label="Light the bonfire"
  title="Light the bonfire"
>
  <span class="theme-toggle-label visually-hidden" data-theme-toggle-label>light the bonfire</span>
  <span class="theme-toggle-icon" aria-hidden="true">
    <svg
      class="theme-toggle-glyph theme-toggle-glyph--flame-off"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      width="18"
      height="18"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      focusable="false"
      aria-hidden="true"
    >
      <path d="M8.973 8.974c-.335 .378 -.67 .716 -.973 1.026c-1.226 1.26 -2 3.24 -2 5a6 6 0 0 0 11.472 2.466m.383 -3.597c-.32 -1.409 -1.122 -3.045 -1.855 -3.869c-.281 .472 -.543 .87 -.79 1.202m-2.358 -2.35c-.068 -2.157 -1.182 -4.184 -1.852 -4.852c0 .968 -.18 1.801 -.465 2.527"></path>
      <path d="M3 3l18 18"></path>
    </svg>
    <svg
      class="theme-toggle-glyph theme-toggle-glyph--flame"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      width="18"
      height="18"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      focusable="false"
      aria-hidden="true"
    >
      <path d="M12 10.941c2.333 -3.308 .167 -7.823 -1 -8.941c0 3.395 -2.235 5.299 -3.667 6.706c-1.43 1.408 -2.333 3.294 -2.333 5.588c0 3.704 3.134 6.706 7 6.706c3.866 0 7 -3.002 7 -6.706c0 -1.712 -1.232 -4.403 -2.333 -5.588c-2.084 3.353 -3.257 3.353 -4.667 2.235"></path>
    </svg>
  </span>
</button>
