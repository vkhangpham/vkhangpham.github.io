<section class="reader-settings" data-reader-settings id="reader-settings-panel" hidden aria-label="Reader settings">
  <div class="reader-settings-body">
    <p class="reader-settings-heading">reader settings</p>
    <form class="reader-settings-form" data-reader-form>
      <div class="reader-settings-grid">
        <label class="reader-setting" for="reader-font-size">
          <span class="reader-setting-header">
            <span class="reader-setting-label">font size</span>
            <output class="reader-setting-output" for="reader-font-size" data-reader-output="fontSize">18px</output>
          </span>
          <input id="reader-font-size" class="reader-setting-range" type="range" name="fontSize" min="16" max="24" step="1" value="18">
        </label>

        <label class="reader-setting" for="reader-line-height">
          <span class="reader-setting-header">
            <span class="reader-setting-label">line spacing</span>
            <output class="reader-setting-output" for="reader-line-height" data-reader-output="lineHeight">1.7x</output>
          </span>
          <input id="reader-line-height" class="reader-setting-range" type="range" name="lineHeight" min="1.5" max="2.2" step="0.05" value="1.7">
        </label>

        <label class="reader-setting" for="reader-word-spacing">
          <span class="reader-setting-header">
            <span class="reader-setting-label">word spacing</span>
            <output class="reader-setting-output" for="reader-word-spacing" data-reader-output="wordSpacing">normal</output>
          </span>
          <input id="reader-word-spacing" class="reader-setting-range" type="range" name="wordSpacing" min="0" max="0.24" step="0.02" value="0">
        </label>

        <label class="reader-setting" for="reader-words-per-line">
          <span class="reader-setting-header">
            <span class="reader-setting-label">words per line</span>
            <output class="reader-setting-output" for="reader-words-per-line" data-reader-output="wordsPerLine">~11</output>
          </span>
          <input id="reader-words-per-line" class="reader-setting-range" type="range" name="wordsPerLine" min="8" max="14" step="1" value="11">
        </label>
      </div>

      <div class="reader-settings-footer">
        <fieldset class="reader-setting reader-setting--columns">
          <legend class="reader-setting-label">layout</legend>
          <div class="reader-choice-group reader-choice-group--icons">
            <label class="reader-choice" title="1 column">
              <input type="radio" name="columns" value="1" checked aria-label="1 column">
              <span>
                <svg class="utility-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" focusable="false" aria-hidden="true">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                  <path d="M6 7a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2z"></path>
                  <path d="M10 9h4"></path>
                  <path d="M10 12h4"></path>
                  <path d="M10 15h4"></path>
                </svg>
                <span class="visually-hidden">1 column</span>
              </span>
            </label>
            <label class="reader-choice" title="2 columns">
              <input type="radio" name="columns" value="2" aria-label="2 columns">
              <span>
                <svg class="utility-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" focusable="false" aria-hidden="true">
                  <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                  <path d="M6 7a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2z"></path>
                  <path d="M12 7v10"></path>
                </svg>
                <span class="visually-hidden">2 columns</span>
              </span>
            </label>
          </div>
        </fieldset>

        {% if page.date %}
          <fieldset class="reader-setting reader-setting--columns">
            <legend class="reader-setting-label">do you like fun?</legend>
            <div class="reader-choice-group reader-choice-group--icons">
              <label class="reader-choice" title="heck yea">
                <input type="radio" name="showEmotes" value="true" checked aria-label="heck yea">
                <span>
                  <svg class="utility-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" focusable="false" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                    <path d="M8 14s1.5 2 4 2s4 -2 4 -2"></path>
                    <path d="M9 9h.01"></path>
                    <path d="M15 9h.01"></path>
                    <path d="M7 4h10a3 3 0 0 1 3 3v10a3 3 0 0 1 -3 3h-10a3 3 0 0 1 -3 -3v-10a3 3 0 0 1 3 -3"></path>
                  </svg>
                  <span class="visually-hidden">heck yea</span>
                </span>
              </label>
              <label class="reader-choice" title="i'm just a sad grumpy boring person">
                <input type="radio" name="showEmotes" value="false" aria-label="i'm just a sad grumpy boring person">
                <span>
                  <svg class="utility-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" focusable="false" aria-hidden="true">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                    <path d="M8 16s1.5 -2 4 -2s4 2 4 2"></path>
                    <path d="M9 9h.01"></path>
                    <path d="M15 9h.01"></path>
                    <path d="M7 4h10a3 3 0 0 1 3 3v10a3 3 0 0 1 -3 3h-10a3 3 0 0 1 -3 -3v-10a3 3 0 0 1 3 -3"></path>
                  </svg>
                  <span class="visually-hidden">i'm just a sad grumpy boring person</span>
                </span>
              </label>
            </div>
          </fieldset>
        {% endif %}

        <button class="reader-reset" type="reset">reset</button>
      </div>
    </form>
  </div>
</section>
