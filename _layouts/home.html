---
layout: default
---
<section class="hero page-panel home-hero">
  <div class="page-body home-hero-body{% if content != '' %} home-hero-body--split{% endif %}">
    <div class="home-hero-main">
      <p class="eyebrow">personal blog</p>
      <h1>{{ site.title }}</h1>
      <p class="hero-copy">{{ page.intro | default: site.description }}</p>
    </div>

    {% if content != "" %}
    <div class="home-hero-intro">
      <div class="home-hero-intro-copy prose">
        {{ content }}
      </div>
    </div>
    {% endif %}
  </div>
</section>

<section class="panel page-panel">
  <div class="section-heading">
    <h2>latest writing</h2>
    <a class="section-link" href="{{ '/archive/' | relative_url }}">
      <span>archive</span>
      <svg class="utility-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" focusable="false" aria-hidden="true">
        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
        <path d="M5 12h14"></path>
        <path d="M13 6l6 6"></path>
        <path d="M13 18l6 -6"></path>
      </svg>
    </a>
  </div>

  <div class="page-body">
    <div class="post-list">
      {% for post in site.posts %}
        {% include post-card.html post=post show_excerpt=true %}
      {% endfor %}
    </div>
  </div>
</section>
